name: Keep Render Backend Warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl --fail --silent --show-error --max-time 60 https://fp-a-platform.onrender.com/health
